<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120">
  <defs>
    <linearGradient id="gold-shimmer" x1="-20%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#b8860b" />
      <stop offset="40%" stop-color="#ffd700" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#ffd700" />
      <stop offset="100%" stop-color="#b8860b" />
      <animate attributeName="x1" values="-50%; 150%" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%; 200%" dur="2.5s" repeatCount="indefinite" />
    </linearGradient>
  </defs>

  <g transform="translate(400, 60)" font-family="sans-serif" font-size="64" font-weight="900" dominant-baseline="middle">
    
    <g transform="translate(-280, 0)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-8; 0,0" dur="2.5s" repeatCount="indefinite" additive="sum"/>
        <animateTransform attributeName="transform" type="scale" values="1; 1.15; 1" dur="2.5s" repeatCount="indefinite" additive="sum"/>
        <text x="0" y="0" text-anchor="middle">🚀</text>
      </g>
    </g>

    <text x="0" y="0" text-anchor="middle" fill="url(#gold-shimmer)">DSA MADNESS</text>
    
  </g>
</svg>
