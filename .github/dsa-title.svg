<svg xmlns="http://www.w3.org/2000/svg" width="800" height="120">
  <defs>
    <linearGradient id="sword-shimmer" x1="-20%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#808080" />
      <stop offset="40%" stop-color="#a0a0a0" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#a0a0a0" />
      <stop offset="100%" stop-color="#808080" />
      <animate attributeName="x1" values="-50%; 150%" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0%; 200%" dur="2.5s" repeatCount="indefinite" />
    </linearGradient>
  </defs>
  <text x="50%" y="50%" font-family="sans-serif" font-size="64" font-weight="900" fill="url(#sword-shimmer)" text-anchor="middle" dominant-baseline="middle">
    🚀 DSA MADNESS
  </text>
</svg>
